services:
  photobot:
    build: .
    container_name: photobot
    restart: unless-stopped

    # All secrets live in .env — Docker reads it automatically
    env_file:
      - .env

    ports:
      - "${DASHBOARD_PORT:-3000}:3000"

    volumes:
      # Persistent state (bot-state.json) and logs survive container restarts
      - ./data:/app/data

    # Point state file and log at the mounted volume
    environment:
      - STATE_FILE=/app/data/bot-state.json
      - LOG_FILE=/app/data/bot.log

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
